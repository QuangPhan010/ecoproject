{% extends "users/base.html" %} {% block title %}Đăng nhập | QShop{% endblock %}
{% block content %}
<style>
  .login-container {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    padding: 32px;
    border-radius: 16px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    transition: 0.3s;
  }


  .login-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .login-header i {
    font-size: 40px;
    color: #4f46e5;
  }

  .login-header h2 {
    margin-top: 10px;
    font-weight: bold;
  }

  .login-desc {
    font-size: 14px;
    color: #777;
  }

  .login-card form p {
    margin-bottom: 15px;
  }

  .login-card input[type="text"],
  .login-card input[type="password"],
  .login-card input[type="email"] {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.2s;
  }


  .login-card input:focus {
    border-color: #4f46e5;
  }

  .login-card input[type="submit"] {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  .login-card input[type="submit"]:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4);
  }

  .login-links {
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
  }

  .login-links a {
    color: #4f46e5;
    text-decoration: none;
    font-weight: 500;
  }

  .login-links a:hover {
    text-decoration: underline;
  }
</style>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-shop"></i>
      <h2>QShop</h2>
      <div class="login-desc">Đăng nhập để mua sắm nhanh chóng</div>
    </div>

    <form action="{% url 'users:login' %}" method="post">
      {% csrf_token %} {{ form.as_p }}
      <p><input type="submit" value="Đăng nhập" /></p>
    </form>

    <div class="login-links">
      <p><a href="{% url 'users:password_reset' %}">Quên mật khẩu?</a></p>
      <p>
        Chưa có tài khoản? <a href="{% url 'users:register' %}">Đăng ký ngay</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
