{% extends "users/base.html" %}
{% block title %}Chào mừng | QShop{% endblock %}

{% block content %}
<style>
.register-done-card {
  max-width: 520px;
  width: 100%;
  border-radius: 16px;
  padding: 32px;
  text-align: center;
  background: #ffffff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  transition: 0.3s;
}



.register-done-icon {
  font-size: 52px;
  color: #4f46e5;
}

.register-done-btn {
  min-width: 200px;
  padding: 10px 18px;
  border-radius: 8px;
  background: linear-gradient(135deg,#4f46e5,#6366f1);
  border: none;
  color: #fff;
  font-weight: bold;
  transition: 0.3s;
}

.register-done-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 15px rgba(79,70,229,0.4);
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:75vh;">
  <div class="register-done-card">

    <div class="register-done-icon mb-2">
      <i class="bi bi-person-check-fill"></i>
    </div>

    <h3 class="mb-2">
      Chào mừng, {{ new_user.first_name|default:new_user.username }}! 🎉
    </h3>

    <p class="text-muted mt-2">
      Tài khoản của bạn đã được tạo thành công.  
      Bạn có thể đăng nhập để bắt đầu mua sắm tại <strong>QShop</strong>.
    </p>

    <a href="{% url 'users:login' %}" class="register-done-btn mt-3 d-inline-block">
      <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập ngay
    </a>

  </div>
</div>
{% endblock %}
