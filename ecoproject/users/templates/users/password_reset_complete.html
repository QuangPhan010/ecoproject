{% extends "users/base.html" %} {% block title %}Hoàn tất | QShop{% endblock %}
{% block content %}
<style>
  .reset-complete-card {
    max-width: 480px;
    width: 100%;
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    transition: 0.3s;
  }

  

  .reset-complete-icon {
    font-size: 52px;
    color: #22c55e;
  }

  .reset-complete-btn {
    min-width: 180px;
    padding: 10px 18px;
    border-radius: 8px;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    border: none;
    color: #fff;
    font-weight: bold;
    transition: 0.3s;
  }

  .reset-complete-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4);
  }
</style>

<div
  class="container d-flex justify-content-center align-items-center"
  style="min-height: 75vh"
>
  <div class="reset-complete-card">
    <div class="reset-complete-icon mb-2">
      <i class="bi bi-check-circle-fill"></i>
    </div>

    <h4 class="mb-2">Đặt lại mật khẩu thành công</h4>

    <p class="text-muted mt-2">
      Bạn có thể đăng nhập bằng mật khẩu mới và tiếp tục mua sắm tại
      <strong>QShop</strong>.
    </p>

    <a
      href="{% url 'users:login' %}"
      class="reset-complete-btn mt-3 d-inline-block"
    >
      <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập ngay
    </a>
  </div>
</div>
{% endblock %}
