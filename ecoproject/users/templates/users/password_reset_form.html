{% extends "users/base.html" %} {% block title %}Quên mật khẩu | QShop{% endblock %} {% block content %}
<style>
  .reset-container {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .reset-card {
    width: 100%;
    max-width: 420px;
    padding: 32px;
    border-radius: 16px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    transition: 0.3s;
  }

  

  .reset-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .reset-header i {
    font-size: 42px;
    color: #4f46e5;
  }

  .reset-header h2 {
    margin-top: 10px;
    font-weight: bold;
  }

  .reset-desc {
    font-size: 14px;
    color: #777;
  }

  .reset-card form p {
    margin-bottom: 15px;
  }

  .reset-card input[type="email"] {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.2s;
  }

  

  .reset-card input:focus {
    border-color: #4f46e5;
  }

  .reset-btn {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  .reset-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4);
  }

  .reset-footer {
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
  }

  .reset-footer a {
    color: #4f46e5;
    text-decoration: none;
    font-weight: 500;
  }

  .reset-footer a:hover {
    text-decoration: underline;
  }
</style>

<div class="reset-container">
  <div class="reset-card">
    <div class="reset-header">
      <i class="bi bi-lock-fill"></i>
      <h2>QShop</h2>
      <div class="reset-desc">Nhập email chính để nhận mã OTP đặt lại mật khẩu</div>
    </div>

    <form action="." method="post">
      {% csrf_token %} {{ form.as_p }}

      <button type="submit" class="reset-btn mt-2">
        <i class="bi bi-envelope me-1"></i> Gửi OTP qua email
      </button>
    </form>

    <div class="reset-footer">
      <a href="{% url 'users:login' %}">
        <i class="bi bi-arrow-left"></i> Quay lại đăng nhập
      </a>
    </div>
  </div>
</div>
{% endblock %}
