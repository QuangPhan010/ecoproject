{% extends "users/base.html" %}
{% block title %}Đổi mật khẩu | QShop{% endblock %}

{% block content %}
<style>
.password-container {
  min-height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.password-card {
  width: 100%;
  max-width: 420px;
  padding: 32px;
  border-radius: 16px;
  background: #ffffff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  transition: 0.3s;
}


.password-header {
  text-align: center;
  margin-bottom: 20px;
}

.password-header i {
  font-size: 42px;
  color: #4f46e5;
}

.password-desc {
  font-size: 14px;
  color: #777;
}

.password-card form p {
  margin-bottom: 15px;
}

.password-card input[type="password"] {
  width: 100%;
  padding: 11px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.2s;
}


.password-card input:focus {
  border-color: #4f46e5;
}

.password-btn {
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg,#4f46e5,#6366f1);
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.password-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 15px rgba(79,70,229,0.4);
}
</style>

<div class="password-container">
  <div class="password-card">

    <div class="password-header">
      <i class="bi bi-shield-lock-fill"></i>
      <h3 class="mt-2">Đổi mật khẩu</h3>
      <div class="password-desc">Cập nhật mật khẩu để bảo mật tài khoản QShop của bạn</div>
    </div>

    <form action="." method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="password-btn mt-2">
        <i class="bi bi-check-circle me-1"></i> Cập nhật mật khẩu
      </button>
    </form>

  </div>
</div>
{% endblock %}
