{% extends "users/base.html" %}
{% block title %}Đặt mật khẩu mới | QShop{% endblock %}

{% block content %}
<style>
.reset-confirm-card {
  max-width: 420px;
  width: 100%;
  border-radius: 16px;
  padding: 32px;
  background: #ffffff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  transition: 0.3s;
}



.reset-confirm-icon {
  font-size: 48px;
  color: #4f46e5;
}

.reset-confirm-card input {
  width: 100%;
  padding: 11px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}



.reset-confirm-btn {
  width: 100%;
  padding: 11px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg,#4f46e5,#6366f1);
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

.reset-confirm-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 15px rgba(79,70,229,0.4);
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="reset-confirm-card">

    <div class="text-center mb-3">
      <i class="bi bi-shield-lock reset-confirm-icon"></i>
      <h3 class="mt-2">Đặt mật khẩu mới</h3>
      <p class="text-muted small">OTP đã xác thực cho email {{ masked_email }}. Vui lòng nhập mật khẩu mới.</p>
    </div>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="reset-confirm-btn mt-2">
        <i class="bi bi-check-circle me-1"></i> Cập nhật mật khẩu
      </button>
    </form>

  </div>
</div>
{% endblock %}
