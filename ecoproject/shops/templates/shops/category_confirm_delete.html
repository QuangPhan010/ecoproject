{% extends "shops/base.html" %}
{% block title %}Xóa danh mục{% endblock %}

{% block content %}
<div class="container my-5" style="max-width:500px">

  <div class="card p-4 text-center shadow-sm">
    <h5 class="mb-3 text-danger">⚠️ Xác nhận xóa</h5>

    <p>Bạn có chắc muốn xóa danh mục:</p>
    <strong class="fs-5">{{ category.name }}</strong>

    <form method="post" class="mt-4">
      {% csrf_token %}
      <button class="btn btn-danger">🗑 Xóa</button>
      <a href="{% url 'shops:category_manage' %}" class="btn btn-secondary ms-2">
        Hủy
      </a>
    </form>
  </div>

</div>
{% endblock %}
